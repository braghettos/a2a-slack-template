name: build-and-push

# Builds the Slack <-> kagent A2A proxy container and pushes it to Google Artifact
# Registry (the registry k8s/deployment.yaml pulls from). Runs on version tags
# (v*) and on manual dispatch. Uncomment the `branches:` line to also publish
# :latest on every push to main.
#
# ---------------------------------------------------------------------------
# REQUIRED config — Settings -> Secrets and variables -> Actions -> Variables:
#   GAR_IMAGE            full image path WITHOUT a tag, e.g.
#                        us-docker.pkg.dev/neon-481711/gcr.io/a2a-slack-bot
#   GCP_WIF_PROVIDER     Workload Identity provider resource name:
#                        projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/<POOL>/providers/<PROVIDER>
#   GCP_SERVICE_ACCOUNT  deployer SA email, e.g. gh-actions@neon-481711.iam.gserviceaccount.com
#
# Workload Identity Federation (above) is keyless and recommended. If you'd rather
# use a service-account JSON key, add a secret GCP_SA_KEY and swap the auth step
# for the commented `credentials_json` variant below.
# ---------------------------------------------------------------------------

on:
  push:
    tags: ['v*']
    # branches: [main]          # uncomment to also build :latest on every push to main
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write               # required for Workload Identity Federation

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tags
        name: Compute image tags
        run: |
          set -euo pipefail
          image="${{ vars.GAR_IMAGE }}"
          if [ -z "$image" ]; then
            echo "::error::Repository variable GAR_IMAGE is not set (e.g. us-docker.pkg.dev/<project>/<repo>/a2a-slack-bot)"; exit 1
          fi
          tags="${image}:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tags="${tags},${image}:${{ github.ref_name }}"   # immutable version tag, e.g. :v1.0.0
          else
            tags="${tags},${image}:sha-${GITHUB_SHA::12}"    # traceable build from a manual run
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Pushing: ${tags}"

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
        # --- Alternative: service-account JSON key (less secure) ---
        # with:
        #   token_format: access_token
        #   credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev          # must match the host in GAR_IMAGE
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
